name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.claude' \
            --exclude 'CLAUDE.md' \
            --exclude 'README.md' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ bram@$VPS_HOST:/opt/apps/ahorn-landing/

          ssh -i ~/.ssh/deploy_key bram@$VPS_HOST \
            "cd /opt/apps/ahorn-landing && sudo docker compose up -d --build"
